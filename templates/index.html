<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>AcademiAI | Consultoria Profissional</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>AcademiAI</h1>
        <p>Formatação e Otimização Académica</p>

        <form action="/enviar" method="POST" enctype="multipart/form-data">
            <!-- Campo Anti-spam -->
            <input type="text" name="website" style="display:none;" tabindex="-1">
            
            <input type="text" name="nome" placeholder="Nome Completo" required>
            <input type="email" name="email" placeholder="E-mail" required>
            
            <select name="servico" required>
                <option value="Formatação Académica">Formatação Académica</option>
                <option value="Currículo">Otimização de Currículo</option>
            </select>

            <textarea name="pedido" placeholder="Detalhes do pedido"></textarea>
            <input type="file" name="ficheiro" required>
            
            <div style="margin-top: 10px;">
                <input type="checkbox" id="termos" name="termos" required>
                <label for="termos">Li e aceito os <a href="/termos" target="_blank">Termos e Condições</a>.</label>
            </div>
            
            <button type="submit">Enviar Pedido</button>
        </form>

        <!-- Links extras -->
        <div style="margin-top: 20px; text-align: center;">
            <p><a href="/faq">Dúvidas Frequentes (FAQ)</a></p>
        </div>
    </div>
</body>
</html>

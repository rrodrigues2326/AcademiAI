<!DOCTYPE html>
<html>
<head>
    <title>AcademiAI | Formatação</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Formatação Académica</h1>
        <form action="/enviar" method="POST" enctype="multipart/form-data">
            <input type="text" name="nome" placeholder="Teu nome completo" required style="width: 100%; padding: 10px; margin: 10px 0;"><br>
            <input type="email" name="email" placeholder="Teu e-mail" required style="width: 100%; padding: 10px; margin: 10px 0;"><br>
            <textarea name="pedido" placeholder="Descreve o tipo de documento (APA, ABNT, etc.)" style="width: 100%; padding: 10px; margin: 10px 0; height: 100px;"></textarea><br>
            
            <label style="display:block; margin-top:10px;">Carregar o teu documento:</label>
            <input type="file" name="ficheiro" required style="margin: 10px 0;"><br>
            
            <button type="submit" class="botao">Enviar Pedido</button>
        </form>
    </div>
</body>
</html>
